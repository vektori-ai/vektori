<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vektori — Memory Explorer</title>
<style>
  :root {
    --bg: #101113; --panel: #17181b; --panel2: #1d1f23; --border: #26282c;
    --text: #e7e9ec; --muted: #94989f; --faint: #5c6066;
    --accent: #6aa1ff; --accent-dim: #2a3a58;
    --ok: #4cc38a; --warn: #e5a13d; --bad: #e5534b;
    --fact: #6aa1ff; --episode: #e5a13d; --sentence: #94989f;
    --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 13px/1.5 system-ui, -apple-system, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  ::selection { background: var(--accent-dim); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #2c2e33; border-radius: 5px; border: 2px solid var(--bg); }

  .app { display: grid; grid-template-rows: 44px 1fr; height: 100vh; }
  .cols { display: grid; grid-template-columns: 192px 1fr; min-height: 0; }
  .cols.with-inspector { grid-template-columns: 192px 1fr 400px; }

  /* top bar */
  .topbar {
    display: flex; align-items: center; gap: 14px; padding: 0 14px;
    border-bottom: 1px solid var(--border); background: var(--panel);
  }
  .brand { font-weight: 650; letter-spacing: -0.01em; white-space: nowrap; }
  .brand span { color: var(--faint); font-weight: 400; }
  select {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 8px; font: inherit; max-width: 220px;
  }
  .searchbox {
    flex: 1; max-width: 460px; display: flex; align-items: center; gap: 8px;
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; color: var(--faint); cursor: text;
  }
  .searchbox input {
    flex: 1; background: none; border: none; outline: none; color: var(--text); font: inherit;
  }
  kbd {
    font: 11px var(--mono); background: var(--bg); border: 1px solid var(--border);
    border-bottom-width: 2px; border-radius: 4px; padding: 0 5px; color: var(--muted);
  }
  .status { margin-left: auto; display: flex; gap: 14px; font-size: 12px; color: var(--muted); white-space: nowrap; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: 1px; }
  .dot.ok { background: var(--ok); } .dot.bad { background: var(--bad); }

  /* left rail */
  .rail { border-right: 1px solid var(--border); background: var(--panel); padding: 10px 8px; overflow-y: auto; }
  .rail button {
    display: flex; width: 100%; align-items: center; gap: 8px; padding: 6px 10px;
    background: none; border: none; border-radius: 6px; color: var(--muted);
    font: inherit; cursor: pointer; text-align: left;
  }
  .rail button:hover { background: var(--panel2); color: var(--text); }
  .rail button.active { background: var(--accent-dim); color: var(--text); }
  .rail .count { margin-left: auto; font: 11px var(--mono); color: var(--faint); }
  .rail .num { color: var(--faint); font: 11px var(--mono); width: 10px; }
  .rail h4 { margin: 14px 10px 4px; font-size: 10px; text-transform: uppercase;
             letter-spacing: 0.08em; color: var(--faint); font-weight: 600; }

  /* content */
  .content { overflow-y: auto; min-width: 0; }
  .page { padding: 18px 22px; max-width: 1080px; }
  .page h2 { margin: 0 0 2px; font-size: 16px; font-weight: 650; letter-spacing: -0.01em; }
  .page .sub { color: var(--muted); margin-bottom: 16px; }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .chipset { display: flex; gap: 4px; background: var(--panel); border: 1px solid var(--border);
             border-radius: 7px; padding: 3px; }
  .chipset button {
    background: none; border: none; color: var(--muted); font: inherit; cursor: pointer;
    padding: 3px 10px; border-radius: 5px;
  }
  .chipset button.on { background: var(--panel2); color: var(--text); }
  .toolbar input {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font: inherit; padding: 5px 10px; width: 240px;
  }

  /* rows */
  .row {
    display: flex; align-items: baseline; gap: 10px; padding: 8px 10px;
    border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 4px;
  }
  .row:hover { background: var(--panel); }
  .row.sel { background: var(--accent-dim); }
  .row .text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row.dim .text { color: var(--faint); }
  .row .meta { color: var(--faint); font: 11px var(--mono); white-space: nowrap; }
  .badge {
    font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 9px;
    border: 1px solid var(--border); color: var(--muted); white-space: nowrap;
  }
  .badge.semantic { color: var(--accent); border-color: var(--accent-dim); }
  .badge.episodic { color: var(--episode); }
  .badge.procedural { color: var(--ok); }
  .badge.source, .badge.archive { color: var(--muted); }
  .badge.state-off { color: var(--faint); }
  .meter { width: 36px; height: 4px; background: var(--panel2); border-radius: 2px; overflow: hidden; flex: none; align-self: center; }
  .meter i { display: block; height: 100%; background: var(--accent); }

  /* overview */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .panel h3 { margin: 0 0 10px; font-size: 12px; font-weight: 600; color: var(--muted);
              text-transform: uppercase; letter-spacing: 0.06em; }
  .statline { display: flex; gap: 18px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat b { font-size: 19px; font-weight: 650; }
  .stat span { display: block; color: var(--faint); font-size: 11px; }
  pre.mono {
    margin: 0; font: 12px/1.6 var(--mono); white-space: pre-wrap; word-break: break-word;
    color: var(--muted);
  }

  /* inspector */
  .inspector {
    border-left: 1px solid var(--border); background: var(--panel); overflow-y: auto;
    padding: 16px 18px;
  }
  .inspector h3 { margin: 0; font-size: 14px; font-weight: 650; line-height: 1.4; }
  .inspector .close { float: right; background: none; border: none; color: var(--faint);
                      font-size: 16px; cursor: pointer; padding: 0 2px; }
  .inspector .close:hover { color: var(--text); }
  .kv { margin: 12px 0; display: grid; grid-template-columns: 92px 1fr; gap: 4px 10px; font-size: 12px; }
  .kv dt { color: var(--faint); } .kv dd { margin: 0; word-break: break-word; }
  .kv dd.mono { font-family: var(--mono); font-size: 11px; }
  .section-label { margin: 18px 0 8px; font-size: 11px; font-weight: 600; color: var(--faint);
                   text-transform: uppercase; letter-spacing: 0.06em; }
  .quote {
    border-left: 2px solid var(--border); padding: 6px 10px; margin: 6px 0;
    font-size: 12px; color: var(--muted);
  }
  .quote .who { font: 10px var(--mono); color: var(--faint); display: block; margin-bottom: 2px; }
  .quote.user-role { border-left-color: var(--accent); }
  .mini {
    display: block; padding: 7px 10px; margin: 4px 0; border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; color: var(--text); cursor: pointer; background: none;
    width: 100%; text-align: left; font-family: inherit; line-height: 1.45;
  }
  .mini:hover { border-color: var(--accent-dim); background: var(--panel2); }
  .mini .tag { color: var(--faint); font: 10px var(--mono); }

  /* transcript */
  .turn { display: grid; grid-template-columns: 100px 1fr; gap: 12px; padding: 7px 0; }
  .turn .who { font: 11px var(--mono); color: var(--faint); text-align: right; padding-top: 2px; white-space: nowrap; }
  .turn.user-role .who { color: var(--accent); }
  .sent { padding: 1px 6px; margin-left: -6px; border-radius: 4px; }
  .sent.has-facts { cursor: pointer; box-shadow: inset 2px 0 0 var(--ok); padding-left: 8px; }
  .sent.has-facts:hover { background: var(--panel); }
  .sent .fcount { font: 10px var(--mono); color: var(--ok); margin-left: 6px; }

  /* note reading view */
  .note-body { font: 13px/1.7 var(--mono); white-space: pre-wrap; word-break: break-word;
               max-width: 860px; color: var(--text); }
  .note-body .wikilink { color: var(--accent); cursor: pointer; }
  .note-head { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; flex-wrap: wrap; }

  .empty { padding: 48px 0; text-align: center; color: var(--faint); }
  .empty code { font-family: var(--mono); background: var(--panel); padding: 2px 7px; border-radius: 5px; }
  .crumb { color: var(--faint); margin-bottom: 10px; font-size: 12px; }
  .crumb a { color: var(--muted); }
  mark { background: var(--accent-dim); color: var(--text); border-radius: 2px; padding: 0 1px; }

  /* engine identity: sentex = blue, memfs = green */
  .engine { font-size: 9px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
            padding: 1px 7px; border-radius: 4px; vertical-align: 1px; }
  .engine.sx { color: var(--accent); background: rgba(106,161,255,0.08); border: 1px solid rgba(106,161,255,0.3); }
  .engine.mf { color: var(--ok); background: rgba(76,195,138,0.08); border: 1px solid rgba(76,195,138,0.3); }
  .edot { display: inline-block; width: 6px; height: 6px; border-radius: 3px; flex: none; }
  .edot.sx { background: var(--accent); } .edot.mf { background: var(--ok); }

  /* pipeline (overview) */
  .pipe { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 6px 0 2px; }
  .pnode { border: 1px solid var(--border); border-radius: 8px; padding: 7px 16px; text-align: center;
           cursor: pointer; background: var(--panel2); }
  .pnode b { display: block; font-size: 17px; font-weight: 650; }
  .pnode span { color: var(--faint); font-size: 11px; }
  .parrow { color: var(--faint); font-size: 15px; }

  /* graphs */
  .graphwrap { overflow: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }
  svg .gnode { cursor: pointer; }
  svg .gnode rect { fill: var(--panel2); stroke: var(--border); }
  svg .gnode:hover rect { stroke: var(--accent); }
  svg .gnode.off rect { opacity: 0.5; }
  svg .gnode.off text { opacity: 0.5; }
  svg .gnode text { fill: var(--text); font: 11px var(--mono); }
  svg .gband { fill: var(--faint); font: 10px var(--mono); letter-spacing: 0.1em; }
  svg .gedge { stroke: #3a3d44; stroke-width: 1.2; fill: none; }
  svg .gedge.super { stroke: var(--bad); stroke-dasharray: 4 3; stroke-width: 1.4; }
  svg .gtick { stroke: var(--border); stroke-dasharray: 2 4; }
  svg .gaxis { fill: var(--faint); font: 10px var(--mono); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">vektori <span>/ memory</span></div>
    <select id="userSel" title="user"></select>
    <div class="searchbox" onclick="goSearch()">
      <input id="searchInput" placeholder="Search facts, conversations, files…"
             onkeydown="if(event.key==='Enter')goSearch(this.value)">
      <kbd>/</kbd>
    </div>
    <div class="status" id="storeStatus"></div>
  </div>
  <div class="cols" id="cols">
    <nav class="rail" id="rail"></nav>
    <main class="content" id="content"></main>
    <aside class="inspector" id="inspector" hidden></aside>
  </div>
</div>

<script>
'use strict';
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate = (s) => {
  if (!s) return '';
  const d = new Date(s.includes('T') || s.includes(' ') ? s : s + 'T00:00:00');
  return isNaN(d) ? esc(s) : d.toLocaleDateString(undefined, {month:'short', day:'numeric'}) +
    ' ' + d.toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit'});
};
const shortPath = (p) => String(p ?? '').split('/').slice(-2).join('/');
const api = async (path) => {
  const r = await fetch('/api/' + path);
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || r.statusText);
  return r.json();
};

const SECTIONS = [
  ['overview', 'Overview'], ['graph', 'Graph'], ['facts', 'Facts'], ['episodes', 'Episodes'],
  ['sessions', 'Conversations'], ['files', 'Files'], ['journal', 'Journal'],
];
const ENGINE = { facts: 'sx', episodes: 'sx', sessions: 'sx', files: 'mf', journal: 'mf' };
const state = { user: '', meta: null, counts: {}, factState: 'active', factQ: '',
                factView: 'list', fileView: 'list', selId: null };

/* ── boot ─────────────────────────────────────────────────────────────── */
async function boot() {
  state.meta = await api('meta');
  const users = state.meta.db.users;
  $('userSel').innerHTML = users.length
    ? users.map((u) => `<option>${esc(u)}</option>`).join('')
    : '<option value="">(no users)</option>';
  state.user = localStorage.getItem('vk_user') || users[0] || '';
  if (users.includes(state.user)) $('userSel').value = state.user; else state.user = users[0] || '';
  $('userSel').onchange = () => {
    state.user = $('userSel').value;
    localStorage.setItem('vk_user', state.user);
    closeInspector(); route();
  };
  const d = state.meta.db, m = state.meta.memfs;
  $('storeStatus').innerHTML =
    `<span title="conversation memory (3-layer store) — ${esc(d.path)}">
       <i class="dot ${d.ok ? '' : 'bad'}" style="${d.ok ? 'background:var(--accent)' : ''}"></i>
       <span style="color:${d.ok ? 'var(--accent)' : 'var(--bad)'}">sentex</span></span>` +
    `<span title="file memory — ${esc(m.root)} — ${m.notes ?? 0} notes, ${m.chunks ?? 0} chunks indexed">
       <i class="dot ${m.ok ? '' : 'bad'}" style="${m.ok ? 'background:var(--ok)' : ''}"></i>
       <span style="color:${m.ok ? 'var(--ok)' : 'var(--bad)'}">memfs</span></span>`;
  if (!location.hash) location.hash = '#/overview';
  await route();
}

function renderRail(active) {
  $('rail').innerHTML = SECTIONS.map(([id, label], i) => {
    const n = {facts: state.counts.facts_active, episodes: state.counts.episodes,
               sessions: state.counts.sessions, files: state.meta?.memfs?.notes}[id];
    const eng = ENGINE[id];
    return `<button class="${active === id ? 'active' : ''}" onclick="location.hash='#/${id}'">
      <span class="num">${i + 1}</span>${label}
      ${eng ? `<span class="edot ${eng}" title="${eng === 'sx' ? 'conversation memory (sentex)' : 'file memory (memfs)'}"></span>` : ''}
      ${n != null ? `<span class="count">${n}</span>` : ''}</button>`;
  }).join('');
}
const engineChip = (e) => e === 'sx'
  ? '<span class="engine sx" title="from the conversation store">sentex</span>'
  : '<span class="engine mf" title="from the file tree">memfs</span>';

/* ── router ───────────────────────────────────────────────────────────── */
async function route() {
  const [, section = 'overview', ...rest] = location.hash.slice(1).split('/');
  const arg = decodeURIComponent(rest.join('/') || '');
  try {
    if (state.user) state.counts = (await api('overview?user=' + encodeURIComponent(state.user))).counts;
  } catch {}
  renderRail(section);
  closeInspector();
  const c = $('content');
  try {
    if (section === 'overview') await pageOverview(c);
    else if (section === 'graph') await pageGraph(c);
    else if (section === 'facts') {
      if (arg === 'timeline' || arg === 'list') { state.factView = arg; await pageFacts(c); }
      else { await pageFacts(c); if (arg) openFact(arg); }
    }
    else if (section === 'episodes') { await pageEpisodes(c); if (arg) openEpisode(arg); }
    else if (section === 'sessions') arg ? await pageTranscript(c, arg) : await pageSessions(c);
    else if (section === 'files') arg ? await pageNote(c, arg) : await pageFiles(c);
    else if (section === 'journal') await pageJournal(c);
    else if (section === 'search') await pageSearch(c, arg);
  } catch (e) {
    c.innerHTML = `<div class="page"><div class="empty">${esc(e.message)}</div></div>`;
  }
}
window.addEventListener('hashchange', route);

/* ── overview ─────────────────────────────────────────────────────────── */
async function pageOverview(c) {
  if (!state.user) { c.innerHTML = emptySentex(); return; }
  const o = await api('overview?user=' + encodeURIComponent(state.user));
  const n = o.counts;
  c.innerHTML = `<div class="page">
    <h2>What ${esc(state.user)}'s agent knows</h2>
    <div class="sub">Active knowledge across both memory engines · read-only</div>
    <div class="panel" style="margin-bottom:16px">
      <h3>${engineChip('sx')} conversations distill upward &nbsp;·&nbsp; ${engineChip('mf')} files link sideways
        &nbsp;·&nbsp; <a href="#/graph">see both as graphs →</a></h3>
      <div class="pipe">
        ${pnode(n.sessions, 'conversations', '#/sessions')}<span class="parrow">→</span>
        ${pnode(n.sentences, 'sentences heard', '#/sessions')}<span class="parrow">→</span>
        ${pnode(n.facts_active, 'facts learned', '#/facts')}<span class="parrow">→</span>
        ${pnode(n.episodes, 'episodes', '#/episodes')}
        <span style="width:26px"></span>
        ${pnode(o.memfs_stats.notes ?? 0, 'memory files', '#/files')}<span class="parrow">⇄</span>
        ${pnode(o.memfs_stats.links ?? 0, 'wikilinks', '#/graph')}
      </div>
    </div>
    <div class="grid2">
      <div class="panel"><h3>Living profile — top facts by confidence</h3>
        ${o.profile.length ? o.profile.map(factRow).join('') :
          '<div class="empty">No active facts yet.</div>'}
      </div>
      <div class="panel"><h3>MEMORY.md — filesystem map of content</h3>
        ${o.memory_md ? `<pre class="mono">${esc(o.memory_md)}</pre>` :
          '<div class="empty">No MEMORY.md — the agent hasn\'t written file memories yet.</div>'}
      </div>
    </div>
    <div class="grid2" style="margin-top:16px">
      <div class="panel"><h3>Recently learned</h3>
        ${o.recent_facts.map(factRow).join('') || '<div class="empty">—</div>'}
      </div>
      <div class="panel"><h3>Recent file activity</h3>
        ${o.recent_journal.map((j) => `<div class="row" onclick="location.hash='#/journal'">
            <span class="badge">${esc(j.op)}</span>
            <span class="text">${esc(j.query ? '“' + j.query + '”' : shortPath(j.path) || j.title || '')}</span>
            <span class="meta">${fmtDate(j.ts)}</span></div>`).join('') ||
          '<div class="empty">—</div>'}
      </div>
    </div>
  </div>`;
}
const stat = (v, label) => `<div class="stat"><b>${v ?? 0}</b><span>${label}</span></div>`;
const pnode = (v, label, href) =>
  `<div class="pnode" onclick="location.hash='${href}'"><b>${v ?? 0}</b><span>${label}</span></div>`;

function factRow(f) {
  const conf = Math.round((f.confidence ?? 0) * 100);
  return `<div class="row ${f.is_active ? '' : 'dim'}" onclick="openFact('${esc(f.id)}')">
    <span class="text">${esc(f.text)}</span>
    ${f.subject ? `<span class="badge">${esc(f.subject)}</span>` : ''}
    ${f.is_active ? `<span class="meter" title="confidence ${conf}%"><i style="width:${conf}%"></i></span>`
                  : '<span class="badge state-off">superseded</span>'}
    <span class="meta">${fmtDate(f.created_at)}</span>
  </div>`;
}

/* ── graph: layered sentex hierarchy + memfs constellation ────────────── */
const trunc = (s, n) => s.length > n ? s.slice(0, n - 1) + '…' : s;
const pillW = (label) => label.length * 6.6 + 22;

function gnode(x, y, label, full, onclick, cls = '', color = '') {
  const w = pillW(label);
  return `<g class="gnode ${cls}" transform="translate(${x - w / 2},${y})" onclick="${onclick}">
    <title>${esc(full)}</title>
    <rect width="${w}" height="24" rx="12"></rect>
    <text x="${w / 2}" y="16" text-anchor="middle" ${color ? `style="fill:${color}"` : ''}>${esc(label)}</text>
  </g>`;
}
const gedge = (x1, y1, x2, y2, cls = '') =>
  `<path class="gedge ${cls}" d="M${x1},${y1} C${x1},${(y1 + y2) / 2} ${x2},${(y1 + y2) / 2} ${x2},${y2}"></path>`;

// keep nodes in a band from overlapping: sort by desired x, push apart to minGap
function spread(items, minGap, x0) {
  items.sort((a, b) => a.x - b.x);
  let prev = x0 - minGap;
  for (const it of items) {
    it.x = Math.max(it.x, prev + minGap);
    prev = it.x;
  }
  return items;
}

function renderSentexLayers(g) {
  if (!g.facts.length) {
    return '<div class="empty">No facts yet — the hierarchy appears as conversations are distilled.</div>';
  }
  const facts = [...g.facts].sort((a, b) => (a.created_at || '').localeCompare(b.created_at || ''));
  const GAP = 30, Y = {ep: 28, fact: 150, sent: 272};
  const fx = {};
  let x = 120;
  for (const f of facts) {
    const w = pillW(trunc(f.text, 26));
    x += w / 2;
    fx[f.id] = x;
    x += w / 2 + GAP;
  }
  const width = Math.max(x + 60, 900);
  // sentences: desired x = mean of linked facts
  const sentFacts = {};
  for (const e of g.fs) (sentFacts[e.sentence_id] = sentFacts[e.sentence_id] || []).push(e.fact_id);
  const sents = g.sentences.map((s) => ({
    ...s,
    x: (sentFacts[s.id] || []).reduce((a, f) => a + (fx[f] || 0), 0) / ((sentFacts[s.id] || []).length || 1),
  }));
  spread(sents, 215, 120);
  const sx = Object.fromEntries(sents.map((s) => [s.id, s.x]));
  // episodes: desired x = mean of linked facts
  const epFacts = {};
  for (const e of g.ef) (epFacts[e.episode_id] = epFacts[e.episode_id] || []).push(e.fact_id);
  const eps = g.episodes.map((e) => ({
    ...e,
    x: (epFacts[e.id] || []).reduce((a, f) => a + (fx[f] || 0), 0) / ((epFacts[e.id] || []).length || 1),
  }));
  spread(eps, 240, 140);
  const ex = Object.fromEntries(eps.map((e) => [e.id, e.x]));

  const edges =
    g.ef.map((e) => gedge(ex[e.episode_id], Y.ep + 24, fx[e.fact_id], Y.fact)).join('') +
    g.fs.map((e) => gedge(fx[e.fact_id], Y.fact + 24, sx[e.sentence_id], Y.sent)).join('') +
    g.ss.map((e) => {
      const x1 = fx[e.old], x2 = fx[e.new];
      return `<path class="gedge super" d="M${x1},${Y.fact - 4} C${x1},${Y.fact - 42} ${x2},${Y.fact - 42} ${x2},${Y.fact - 4}"></path>
        <text class="gaxis" x="${(x1 + x2) / 2}" y="${Y.fact - 46}" text-anchor="middle" style="fill:var(--bad)">replaced by →</text>`;
    }).join('');

  const nodes =
    eps.map((e) => gnode(e.x, Y.ep, trunc(e.text, 34), e.text, `openEpisode('${esc(e.id)}')`)).join('') +
    facts.map((f) => gnode(fx[f.id], Y.fact, trunc(f.text, 26), f.text,
      `openFact('${esc(f.id)}')`, f.is_active ? '' : 'off', 'var(--accent)')).join('') +
    sents.map((s) => gnode(s.x, Y.sent, trunc(s.text, 30), s.text,
      `location.hash='#/sessions/${encodeURIComponent(s.session_id)}'`, '', 'var(--muted)')).join('');

  const bands = [['EPISODES', Y.ep], ['FACTS', Y.fact], ['SENTENCES', Y.sent]].map(([t, y]) =>
    `<text class="gband" x="12" y="${y + 16}">${t}</text>
     <line class="gtick" x1="78" y1="${y + 12}" x2="${width - 16}" y2="${y + 12}"></line>`).join('');

  return `<div class="graphwrap"><svg width="${width}" height="330">${bands}${edges}${nodes}</svg></div>`;
}

function renderMemfsMap(g) {
  if (!g.nodes.length) {
    return '<div class="empty">No memory files yet.</div>';
  }
  const TYPE_COLOR = {semantic: 'var(--accent)', procedural: 'var(--ok)',
                      episodic: 'var(--episode)', source: 'var(--muted)', archive: 'var(--faint)'};
  const cols = {};
  for (const n of g.nodes) (cols[n.path.split('/')[0]] = cols[n.path.split('/')[0]] || []).push(n);
  const order = ['semantic', 'procedural', 'episodic', 'sources', 'archive'].filter((d) => cols[d]);
  const COLW = 280, height = Math.max(...order.map((d) => cols[d].length)) * 56 + 70;
  const pos = {};
  order.forEach((d, ci) => {
    cols[d].forEach((n, ri) => {
      pos[n.path] = {x: ci * COLW + COLW / 2, y: 56 + ri * 56};
    });
  });
  const width = order.length * COLW;
  const edges = g.edges.map((e) => {
    const a = pos[e.src], b = pos[e.dst];
    if (!a || !b) return '';
    return `<path class="gedge" d="M${a.x},${a.y + 12} C${(a.x + b.x) / 2},${a.y + 12} ${(a.x + b.x) / 2},${b.y + 12} ${b.x},${b.y + 12}"></path>`;
  }).join('');
  const nodes = g.nodes.map((n) => gnode(pos[n.path].x, pos[n.path].y, trunc(n.title, 30), n.path,
    `location.hash='#/files/${encodeURIComponent(n.path)}'`, '', TYPE_COLOR[n.type] || '')).join('');
  const heads = order.map((d, ci) =>
    `<text class="gband" x="${ci * COLW + COLW / 2}" y="22" text-anchor="middle">${d}/</text>`).join('');
  return `<div class="graphwrap"><svg width="${width}" height="${height}">${heads}${edges}${nodes}</svg></div>`;
}

function renderFactTimeline(list) {
  const facts = list.filter((f) => f.created_at);
  if (!facts.length) return '<div class="empty">Nothing to plot.</div>';
  const ts = (s) => new Date(s.replace(' ', 'T')).getTime();
  const t0 = Math.min(...facts.map((f) => ts(f.created_at)));
  const t1 = Math.max(...facts.map((f) => ts(f.created_at)), Date.now());
  const PAD = 240, W = Math.max(980, document.body.clientWidth - 480);
  const X = (t) => PAD + (t - t0) / Math.max(t1 - t0, 1) * (W - PAD - 170);
  const subjects = [...new Set(facts.map((f) => f.subject || 'general'))];
  const laneY = Object.fromEntries(subjects.map((s, i) => [s, 46 + i * 64]));
  const fpos = {};
  for (const lane of subjects) {
    const inLane = facts.filter((f) => (f.subject || 'general') === lane)
      .map((f) => ({f, x: X(ts(f.created_at))}));
    spread(inLane, 60, PAD);
    for (const {f, x} of inLane) fpos[f.id] = {x, y: laneY[lane]};
  }
  const arrows = facts.filter((f) => f.superseded_by && fpos[f.superseded_by]).map((f) => {
    const a = fpos[f.id], b = fpos[f.superseded_by];
    return `<path class="gedge super" d="M${a.x},${a.y - 4} C${a.x},${a.y - 34} ${b.x},${b.y - 34} ${b.x},${b.y - 4}"></path>`;
  }).join('');
  const nodes = facts.map((f) => gnode(fpos[f.id].x, fpos[f.id].y, trunc(f.text, 24), f.text,
    `openFact('${esc(f.id)}')`, f.is_active ? '' : 'off', 'var(--accent)')).join('');
  const lanes = subjects.map((s) =>
    `<text class="gband" x="12" y="${laneY[s] + 16}">${esc(trunc(s, 18))}</text>
     <line class="gtick" x1="${PAD - 30}" y1="${laneY[s] + 12}" x2="${W - 16}" y2="${laneY[s] + 12}"></line>`).join('');
  const axis = [t0, (t0 + t1) / 2, t1].map((t) =>
    `<text class="gaxis" x="${X(t)}" y="${subjects.length * 64 + 40}" text-anchor="middle">${
      new Date(t).toLocaleDateString(undefined, {month: 'short', day: 'numeric'})}</text>`).join('');
  return `<div class="graphwrap"><svg width="${W}" height="${subjects.length * 64 + 52}">
    ${lanes}${arrows}${nodes}${axis}</svg></div>
    <div class="sub" style="margin-top:8px">Knowledge over time, one lane per subject.
      Dimmed pills were superseded — <span style="color:var(--bad)">dashed red</span> points to what replaced them.</div>`;
}

function noteLocalGraph(n) {
  const ins = n.backlinks;
  const outs = n.links_out.filter((l) => l.path);
  if (!ins.length && !outs.length) return '';
  const H = Math.max(ins.length, outs.length, 1) * 44 + 36;
  const cy = H / 2, W = 880;
  const hedge = (x1, y1, x2, y2) =>
    `<path class="gedge" d="M${x1},${y1} C${(x1 + x2) / 2},${y1} ${(x1 + x2) / 2},${y2} ${x2},${y2}"></path>`;
  const side = (items, x, getPath, label) => items.map((it, i) => {
    const y = cy - ((items.length - 1) * 44) / 2 + i * 44 - 12;
    const p = getPath(it);
    return hedge(x < W / 2 ? x + pillW(trunc(label(it), 24)) / 2 : x - pillW(trunc(label(it), 24)) / 2,
                 y + 12, W / 2 + (x < W / 2 ? -75 : 75), cy) +
      gnode(x, y, trunc(label(it), 24), p, `location.hash='#/files/${encodeURIComponent(p)}'`);
  }).join('');
  return `<div class="graphwrap" style="margin:14px 0"><svg width="${W}" height="${H}">
    <line class="gtick" x1="${W / 2}" y1="14" x2="${W / 2}" y2="${H - 14}"></line>
    ${side(ins, 150, (b) => b, (b) => b.split('/').pop().replace('.md', ''))}
    ${side(outs, W - 150, (l) => l.path, (l) => l.slug)}
    ${gnode(W / 2, cy - 12, trunc(n.title, 22), n.path, '', '', 'var(--ok)')}
    ${ins.length ? `<text class="gband" x="150" y="14" text-anchor="middle">LINKED FROM</text>` : ''}
    ${outs.length ? `<text class="gband" x="${W - 150}" y="14" text-anchor="middle">LINKS TO</text>` : ''}
  </svg></div>`;
}

/* ── journal ──────────────────────────────────────────────────────────── */
function journalLine(j) {
  const hits = j.hits || [];
  switch (j.op) {
    case 'recall':
      return [`searched memory for “${j.query}” — ` + (hits.length
        ? `found ${hits.length}: ${hits.map((h) => shortPath(h.path)).join(', ')}`
        : 'found nothing'), 'read'];
    case 'remember': return [`saved a new memory · ${shortPath(j.path)}`, 'write'];
    case 'ingest': return [`imported an external file · ${shortPath(j.src || j.path)}`, 'write'];
    case 'sync': {
      const changed = (j.added || 0) + (j.updated || 0) + (j.removed || 0);
      return [changed
        ? `synced files ↔ index · ${j.added || 0} new, ${j.updated || 0} updated, ${j.removed || 0} removed`
        : 'checked files ↔ index — everything up to date', 'neutral'];
    }
    case 'forget':
      return [`deleted ${(j.removed || []).map(shortPath).join(', ') || j.target} — gone for real, no tombstone`, 'delete'];
    case 'compact': return [`compacted a month of episodics into a digest`, 'write'];
    default: return [JSON.stringify(j), 'neutral'];
  }
}

    ${list.map((j) => {
      const day = (j.ts || '').slice(0, 10);
      const head = day !== lastDay ? `<div class="section-label">${
        new Date(day).toLocaleDateString(undefined, {weekday: 'long', month: 'long', day: 'numeric'})}</div>` : '';
      lastDay = day;
      const [text, kind] = journalLine(j);
      return head + `<div class="row" style="cursor:default">
        <span class="badge" style="${OP_STYLE[kind]}">${esc(j.op)}</span>
        <span class="text">${esc(text)}</span>
        <span class="meta">${fmtDate(j.ts)}</span></div>`;
    }).join('') || '<div class="empty">No journal yet — it appears at the first memfs operation.</div>'}
  </div>`;
}

/* ── search ───────────────────────────────────────────────────────────── */
function goSearch(q) {
  q = (typeof q === 'string' ? q : $('searchInput').value).trim();
  if (q) location.hash = '#/search/' + encodeURIComponent(q);
  else $('searchInput').focus();
}
const hl = (text, q) => esc(text).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'),
  (m) => `<mark>${m}</mark>`);

async function pageSearch(c, q) {
  $('searchInput').value = q;
  const r = await api(`search?user=${encodeURIComponent(state.user)}&q=${encodeURIComponent(q)}`);
  const total = r.facts.length + r.episodes.length + r.sentences.length + r.notes.length;
  c.innerHTML = `<div class="page">
    <h2>“${esc(q)}”</h2><div class="sub">${total} result${total === 1 ? '' : 's'} across both engines</div>
    ${r.facts.length ? `<div class="section-label">Facts ${engineChip('sx')}</div>` + r.facts.map((f) =>
      `<div class="row ${f.is_active ? '' : 'dim'}" onclick="openFact('${esc(f.id)}')">
        <span class="text">${hl(f.text, q)}</span>
        ${f.is_active ? '' : '<span class="badge state-off">superseded</span>'}
        <span class="meta">${fmtDate(f.created_at)}</span></div>`).join('') : ''}
    ${r.notes.length ? `<div class="section-label">Files ${engineChip('mf')}</div>` + r.notes.map((n) =>
      `<div class="row" onclick="location.hash='#/files/${encodeURIComponent(n.path)}'">
        <span class="text">${hl(n.text, q)}</span>
        <span class="badge ${esc(n.type)}">${esc(n.type)}</span>
        <span class="meta">${esc(n.path)}:${n.start_line}</span></div>`).join('') : ''}
    ${r.episodes.length ? `<div class="section-label">Episodes ${engineChip('sx')}</div>` + r.episodes.map((e) =>
      `<div class="row" onclick="openEpisode('${esc(e.id)}')">
        <span class="text">${hl(e.text, q)}</span>
        <span class="meta">${fmtDate(e.created_at)}</span></div>`).join('') : ''}
    ${r.sentences.length ? `<div class="section-label">Said in conversation ${engineChip('sx')}</div>` + r.sentences.map((s) =>
      `<div class="row" onclick="location.hash='#/sessions/${encodeURIComponent(s.session_id)}'">
        <span class="text">${hl(s.text, q)}</span>
        <span class="badge">${esc(s.role)}</span>
        <span class="meta">${fmtDate(s.created_at)}</span></div>`).join('') : ''}
    ${total === 0 ? '<div class="empty">Nothing in either engine matches.</div>' : ''}
  </div>`;
}

/* ── inspector + keyboard ─────────────────────────────────────────────── */
function openInspector(html) {
  $('inspector').hidden = false;
  $('cols').classList.add('with-inspector');
  $('inspector').innerHTML = `<button class="close" onclick="closeInspector()" title="esc">✕</button>` + html;
  $('inspector').scrollTop = 0;
}
function closeInspector() {
  $('inspector').hidden = true;
  $('cols').classList.remove('with-inspector');
}
const emptySentex = () => `<div class="page"><div class="empty">
  No conversation store found.<br>Point the server at one:
  <code>python -m tools.memory_explorer.server --db path/to/vektori.db</code></div></div>`;

document.addEventListener('keydown', (e) => {
  const typing = ['INPUT', 'SELECT', 'TEXTAREA'].includes(document.activeElement.tagName);
  if (e.key === 'Escape') { closeInspector(); document.activeElement.blur(); return; }
  if (typing) return;
  if (e.key === '/') { e.preventDefault(); $('searchInput').focus(); return; }
  const i = parseInt(e.key, 10) - 1;
  if (i >= 0 && i < SECTIONS.length) location.hash = '#/' + SECTIONS[i][0];
});

boot().catch((e) => { $('content').innerHTML = `<div class="page"><div class="empty">${esc(e.message)}</div></div>`; });
</script>
</body>
</html>
